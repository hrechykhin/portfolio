<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/svg+xml" href="/favicon-dark.svg" media="(prefers-color-scheme: dark)" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0e0f11" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f7f5f1" media="(prefers-color-scheme: light)" />

    <!-- Prevent theme flash: read localStorage before React mounts -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('vh-theme');
          if (!t) t = 'dark';
          document.documentElement.dataset.theme = t;
        } catch (e) {}
      })();
    </script>

    <title>Vladyslav Hrechykhin — Python Software Engineer</title>
    <meta name="description" content="Python Software Engineer with 4+ years building production-grade backend systems. Bratislava, Slovakia. Open to backend roles." />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
